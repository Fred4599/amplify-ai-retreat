<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Amplify AI Retreat — Social Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #000;
      font-family: 'Barlow', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      color: #fff;
    }

    .og-bg {
      position: absolute;
      inset: 0;
      background: url('/media/hero-poster.webp') center / cover no-repeat;
    }

    .og-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.55) 45%, rgba(0,0,0,0.88) 100%);
    }

    .og-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 64px 56px;
    }

    .og-badge-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding: 6px 8px 6px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(8px);
    }

    .og-badge {
      background: #fff;
      color: #000;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .og-dates {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.88);
      white-space: nowrap;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 88px;
      line-height: 1.02;
      letter-spacing: -0.02em;
      max-width: 100%;
    }

    .og-presented {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.72);
      letter-spacing: 0.03em;
    }

    .og-presented img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    h2 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 52px;
      line-height: 1.1;
      color: rgba(255, 255, 255, 0.92);
      margin-top: 22px;
      max-width: 900px;
    }

    .og-tagline {
      margin-top: 20px;
      font-size: 20px;
      font-weight: 300;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.82);
      max-width: 720px;
    }

    .og-logo {
      position: absolute;
      bottom: 36px;
      right: 48px;
      height: 28px;
      width: auto;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="og-bg" aria-hidden="true"></div>
    <div class="og-content">
      <div class="og-badge-row">
        <span class="og-badge">50 Seats Only</span>
        <span class="og-dates">July 29–31, 2026 · 3-Day Implementation Retreat</span>
      </div>
      <h1>Amplify AI Retreat</h1>
      <p class="og-presented">
        <span>Presented by</span>
        <img src="/elevated-worldwide-logo.png" alt="" width="36" height="36" />
        <span>Elevated Worldwide</span>
      </p>
      <h2>Three Days, One Breakthrough</h2>
      <p class="og-tagline">Bring your biggest bottleneck. Leave with a real AI-powered path forward.</p>
    </div>
    <img class="og-logo" src="/logo.png" alt="" width="120" height="32" />
  </div>
</body>
</html>
